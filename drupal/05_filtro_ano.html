<button class="btn-mobile-filtros-open" onclick="openMobileFilters()">
    <i class="fa fa-sliders"></i> Filtrar
</button>
<div class="filter-mobile-overlay" id="mobileOverlay" onclick="closeMobileFilters()"></div>
<div class="panel-filtros-wrapper" id="mobileFilterPanel">
    <div class="filter-header-mobile">
        <h3>Filtros</h3>
        <button onclick="closeMobileFilters()">Cerrar <i class="fa fa-times"></i></button>
    </div>
    <div class="panel panel-filtros m-b-0">
        <div class="panel-body">
            <h3 class="h4 fw-bold m-t-0 m-b-1 desktop-filtros-title">Filtros</h3>
            <div class="">
                <label for="filter-anio" class="fw-bold" style="font-size:14px;">Año</label>
                <select id="filter-anio" class="form-control" onchange="onYearChange()">
                    <option value="">Todos</option>
                    <option value="2026">2026</option>
                    <option value="2025">2025</option>
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                </select>
            </div>
            <div class="m-b-2 hidden-md hidden-lg m-t-1">
                <label for="category-select" class="fw-bold" style="font-size:14px;">Categoría</label>
                <select id="category-select" class="form-control" onchange="setCategoria(this.value)">
                    <option value="__all__">Todas las categorías</option>
                </select>
            </div>
            <div id="subcategorias-container" class="row hidden-md hidden-lg"></div>
        </div>
    </div>
    <div class="filter-footer-mobile">
        <button class="btn btn-default btn-restablecer" onclick="resetAllMobile()">Restablecer</button>
        <button class="btn btn-aplicar" onclick="closeMobileFilters()">Aplicar</button>
    </div>
</div>
